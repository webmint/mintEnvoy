project_structure: "```text\nmintenvoy/\n├── src/\n│   ├── main/          # Electron main process (Node.js, app lifecycle)\n│   │   └── index.ts\n│   ├── preload/       # Preload bridge (contextIsolation-safe IPC)\n│   │   ├── index.ts\n│   │   └── index.d.ts\n│   └── renderer/      # React UI (renderer process)\n│       ├── index.html\n│       └── src/\n│           ├── App.tsx\n│           ├── main.tsx\n│           ├── components/\n│           └── assets/\n├── resources/         # App icons / static resources\n├── design/            # Design mockups + tokens\n└── electron.vite.config.ts\n```"
dev_commands: "| Command | Description |\n|---------|-------------|\n| `npm run dev` | Start app in dev mode (electron-vite dev) |\n| `npm run build` | Type-check then build (electron-vite build) |\n| `npm run start` | Preview built app (electron-vite preview) |\n| `npm run lint` | Lint with ESLint (cached) |\n| `npm run format` | Format with Prettier |\n| `npm run typecheck` | Type-check node + web TS configs |\n| `npm run build:mac` | Build + package macOS |\n| `npm run build:win` | Build + package Windows |\n| `npm run build:linux` | Build + package Linux |"
architecture_details: "mintEnvoy follows Electron's three-process model: a **main** process (Node.js — app lifecycle + native APIs), a **preload** bridge (contextIsolation-safe IPC surface between main and renderer), and a **renderer** process (React 19 UI). UI state is held in zustand; local persistence via electron-store; outbound HTTP via undici; auto-update via electron-updater. Bundled by electron-vite, packaged by electron-builder."
workflow_enforcement: Strict
